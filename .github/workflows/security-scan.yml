name: Security Scan (Trivy)

# ============================================================
# Trivy 安全扫描
# 1. 代码仓库扫描：Go 依赖 (go.sum) + npm 依赖 (package-lock.json)
# 2. Dockerfile 配置扫描：检查 Dockerfile 中的不安全配置
# 3. Docker 镜像扫描（仅 master/main/test tag 时）
# ============================================================

on:
  push:
    branches: [master, main]
    paths:
      - 'server/go.sum'
      - 'web/package-lock.json'
      - 'Dockerfile'
  pull_request:
    branches: [master, main]
  schedule:
    # 每天 06:00 UTC 自动扫描
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  # ---- 仓库扫描：Go + npm 依赖 ----
  repo-scan:
    name: Repo Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Go 依赖扫描
      - name: Trivy - Go dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: server/
          format: 'sarif'
          output: 'trivy-go.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Go scan results
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: trivy-go.sarif
          category: trivy-go

      # npm 依赖扫描
      - name: Trivy - npm dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: web/
          format: 'sarif'
          output: 'trivy-npm.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload npm scan results
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: trivy-npm.sarif
          category: trivy-npm

  # ---- Dockerfile 配置扫描 ----
  dockerfile-scan:
    name: Dockerfile Misconfig Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy - Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: Dockerfile
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # ---- Docker 镜像扫描 ----
  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}:test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy - Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
