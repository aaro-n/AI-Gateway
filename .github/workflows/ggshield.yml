name: GitGuardian Secrets Detection

# ============================================================
# GitGuardian ggshield 密钥泄露检测
# 检测代码和 git 历史中的 API Key、Token、证书等
# 免费额度：25 次/天（公开仓库足够）
# ============================================================

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # 每周一 08:00 UTC 全量扫描
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  scan:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 完整 git 历史，检测历史中的泄露

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1
        with:
          args: secret scan path . --exit-zero
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY || '' }}
