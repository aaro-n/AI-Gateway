name: Docker Test Build

# ============================================================
# 测试镜像：每次 push 到任意分支（非 tag）自动构建
# 镜像标签: ghcr.io/{owner}/{repo}:test
# ============================================================

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'          # 排除 tag push，避免和 release workflow 冲突

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取元数据（生成镜像标签和注解）
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=test
          labels: |
            org.opencontainers.image.title=AI Gateway (Test)
            org.opencontainers.image.description=AI Gateway test build from ${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
